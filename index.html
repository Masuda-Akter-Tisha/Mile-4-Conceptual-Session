<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Tracker</title>
    <!-- tailwind css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen">
    <header class="border-2 border-gray-300 mb-5">
        <div class="w-11/12 mx-auto mb-5 mt-2 space-y-4">
            <h1 class="text-6xl font-bold text-green-500">Plant Tracker</h1>
            <div class="grid grid-cols-3 gap-5">
                <div class="bg-yellow-200 border-2 border-gray-200 rounded-md py-3 px-11">
                    <p>Total</p>
                    <p id="total">0</p>
                </div>
                <div class="bg-green-200 border-2 border-gray-200 rounded-md py-3 px-11">
                    <p>Thriving</p>
                    <p id="thrivingCount">0</p>
                </div>
                <div class="bg-red-200 border-2 border-gray-200 rounded-md py-3 px-11">
                    <p>Struggling</p>
                    <p id="strugglingCount">0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="w-11/12 mx-auto">
        <div class="space-x-5">
            <button class="bg-black text-white px-8 py-5 rounded-md" id="all-filter-btn">All</button>
            <button class="bg-gray-300 px-8 py-5 rounded-md" id="thriving-filter-btn">Thriving</button>
            <button class="bg-gray-300 px-8 py-5 rounded-md" id="struggling-filter-btn">Struggling</button>
        </div>
    </main>
</body>
</html>
